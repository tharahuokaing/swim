<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ការប្រកួតប្រណាំងហែលទឹក - Swimming Race</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <h1>🏊 ការប្រកួតប្រណាំងហែលទឹក 🏊</h1>
        <p class="subtitle">កម្មវិធីប្រកួតប្រជែងល្បឿនថ្នាក់ជាតិ</p>

        <div class="swimming-pool">
            <div class="lane" id="lane1">
                <span class="lane-number">1</span>
                <div class="swimmer" id="swimmer1">🏊‍♂️ <span class="name">កីឡាករ អាត់</span></div>
                <div class="finish-line"></div>
            </div>
            
            <div class="lane" id="lane2">
                <span class="lane-number">2</span>
                <div class="swimmer" id="swimmer2">🏊‍♂️ <span class="name">កីឡាករ ប៊ី</span></div>
                <div class="finish-line"></div>
            </div>

            <div class="lane" id="lane3">
                <span class="lane-number">3</span>
                <div class="swimmer" id="swimmer3">🏊‍♂️ <span class="name">កីឡាករ ស៊ី</span></div>
                <div class="finish-line"></div>
            </div>
        </div>

        <div class="controls">
            <button id="startBtn">ចាប់ផ្តើមប្រកួត 🏁</button>
            <button id="resetBtn">រៀបចំឡើងវិញ 🔄</button>
        </div>

        <div id="result" class="result-box">សូមចុចប៊ូតុងដើម្បីចាប់ផ្តើម!</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
